<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VO2 Max Plan — bowlie</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a; --surface: #131313; --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.07); --accent: #e8ff47; --accent2: #ff6b35;
    --text: #f0ede8; --muted: #6b6b6b;
    --easy: #4ade80; --tempo: #60a5fa; --vo2: #f87171; --rest: #6b7280;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }

  .header { padding: 3rem 2rem 2rem; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(232,255,71,0.06) 0%, transparent 70%); pointer-events: none; }
  .header-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1.5rem; }
  .header-tag { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.5rem; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 6rem); letter-spacing: 0.02em; line-height: 0.95; }
  .header h1 span { color: var(--accent); }
  .header-meta { display: flex; gap: 2rem; margin-top: 1.5rem; flex-wrap: wrap; }
  .meta-item { font-size: 13px; color: var(--muted); }
  .meta-item strong { color: var(--text); font-weight: 500; }

  .strava-panel { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; padding-top: 0.5rem; }
  .strava-btn { display: flex; align-items: center; gap: 10px; background: #FC4C02; color: white; border: none; border-radius: 6px; padding: 10px 18px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; text-decoration: none; transition: opacity 0.15s; white-space: nowrap; }
  .strava-btn:hover { opacity: 0.88; }
  .strava-connected { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--easy); font-family: 'DM Mono', monospace; }
  .strava-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--easy); object-fit: cover; }
  .strava-disconnect { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: 'DM Sans', sans-serif; }
  .strava-disconnect:hover { color: var(--text); }

  .pace-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; overflow-x: auto; }
  .pace-bar-inner { max-width: 900px; margin: 0 auto; display: flex; gap: 2rem; align-items: center; min-width: 560px; }
  .pace-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
  .pace-chip { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  .pace-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pace-chip-text { font-size: 12px; font-family: 'DM Mono', monospace; }
  .pace-chip-name { color: var(--muted); margin-right: 4px; }

  .week-nav { max-width: 900px; margin: 2rem auto 0; padding: 0 2rem; display: flex; gap: 8px; flex-wrap: wrap; }
  .week-btn { font-family: 'DM Mono', monospace; font-size: 12px; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; }
  .week-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .week-btn.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); font-weight: 500; }
  .week-btn.recovery { border-color: rgba(255,107,53,0.4); }
  .week-btn.recovery.active { background: var(--accent2); border-color: var(--accent2); color: white; }

  .main { max-width: 900px; margin: 0 auto; padding: 2rem; }

  .progress-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 2rem; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); margin-bottom: 8px; }
  .progress-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.4s ease; }

  .week-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
  .week-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 0.02em; line-height: 1; }
  .week-focus { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
  .week-stats { display: flex; gap: 1.5rem; padding: 1rem 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; flex-shrink: 0; }
  .stat { text-align: right; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--accent); }
  .stat-key { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  .sessions { display: flex; flex-direction: column; gap: 12px; }
  .session-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem 1.5rem; display: grid; grid-template-columns: 100px 1fr auto; gap: 1rem; align-items: start; transition: border-color 0.15s; position: relative; overflow: hidden; }
  .session-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .session-card.easy::before { background: var(--easy); }
  .session-card.tempo::before { background: var(--tempo); }
  .session-card.vo2::before { background: var(--vo2); }
  .session-card.rest::before { background: var(--rest); }
  .session-card:hover { border-color: rgba(255,255,255,0.12); }
  .session-day { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; padding-top: 2px; }
  .session-type-badge { display: inline-block; font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 6px; }
  .easy .session-type-badge { background: rgba(74,222,128,0.12); color: var(--easy); }
  .tempo .session-type-badge { background: rgba(96,165,250,0.12); color: var(--tempo); }
  .vo2 .session-type-badge { background: rgba(248,113,113,0.12); color: var(--vo2); }
  .rest .session-type-badge { background: rgba(107,114,128,0.12); color: var(--rest); }
  .session-title { font-weight: 500; font-size: 15px; margin-bottom: 6px; }
  .session-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .session-desc strong { color: var(--text); font-weight: 500; }
  .session-meta { text-align: right; flex-shrink: 0; min-width: 80px; }
  .session-dist { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--text); }
  .session-dist-unit { font-size: 11px; color: var(--muted); }
  .session-pace { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .session-check { position: absolute; top: 1rem; right: 1rem; width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: transparent; }
  .session-check:hover { border-color: var(--accent); }
  .session-check.done { background: var(--accent); border-color: var(--accent); }
  .session-check.done::after { content: '✓'; font-size: 12px; color: #0a0a0a; font-weight: 700; }

  /* Link activity area */
  .link-activity-area { margin-top: 12px; }
  .link-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; font-family: 'DM Mono', monospace;
    padding: 5px 12px; border-radius: 4px; cursor: pointer;
    border: 1px dashed rgba(252,76,2,0.4); color: #FC4C02;
    background: rgba(252,76,2,0.05); transition: all 0.15s;
  }
  .link-btn:hover { background: rgba(252,76,2,0.1); border-color: #FC4C02; }
  .link-btn.hidden { display: none; }

  /* Activity picker dropdown */
  .activity-picker {
    margin-top: 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
    display: none;
  }
  .activity-picker.open { display: block; }
  .picker-header { padding: 8px 12px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
  .picker-close { cursor: pointer; color: var(--muted); font-size: 16px; line-height: 1; }
  .picker-close:hover { color: var(--text); }
  .picker-list { max-height: 220px; overflow-y: auto; }
  .picker-item {
    padding: 10px 12px; cursor: pointer; border-bottom: 1px solid var(--border);
    display: grid; grid-template-columns: 1fr auto; gap: 8px; align-items: center;
    transition: background 0.1s;
  }
  .picker-item:last-child { border-bottom: none; }
  .picker-item:hover { background: rgba(255,255,255,0.04); }
  .picker-item-name { font-size: 13px; font-weight: 500; color: var(--text); }
  .picker-item-meta { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .picker-item-date { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-align: right; }
  .picker-empty { padding: 1.5rem; text-align: center; font-size: 13px; color: var(--muted); }

  /* Linked activity display */
  .linked-activity {
    margin-top: 8px; padding: 10px 12px;
    background: rgba(74,222,128,0.05); border: 1px solid rgba(74,222,128,0.15);
    border-radius: 6px;
  }
  .linked-activity-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 6px; }
  .linked-activity-name { font-size: 13px; font-weight: 500; color: var(--easy); }
  .linked-activity-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }
  .unlink-btn { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; text-decoration: underline; }
  .unlink-btn:hover { color: var(--text); }
  .linked-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
  .linked-stat { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }
  .linked-stat span { color: var(--text); }
  .ai-feedback-btn { font-size: 11px; font-family: 'DM Mono', monospace; background: rgba(232,255,71,0.08); border: 1px solid rgba(232,255,71,0.2); color: var(--accent); border-radius: 4px; padding: 4px 10px; cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px; }
  .ai-feedback-btn:hover { background: rgba(232,255,71,0.14); }
  .ai-feedback-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .ai-feedback-box { margin-top: 8px; padding: 10px 12px; background: var(--surface2); border-radius: 6px; font-size: 13px; color: var(--muted); line-height: 1.6; border-left: 2px solid var(--accent); display: none; }

  .recovery-banner { background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.2); border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: flex-start; }
  .recovery-icon { font-size: 24px; flex-shrink: 0; }
  .recovery-text { font-size: 13px; color: var(--muted); }
  .recovery-text strong { color: var(--accent2); }

  .tips-section { margin-top: 2rem; }
  .tips-title { font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 1rem; }
  .tips-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
  .tip-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; font-size: 13px; color: var(--muted); line-height: 1.5; }
  .tip-card strong { color: var(--text); display: block; margin-bottom: 4px; }

  .week-panel { display: none; }
  .week-panel.active { display: block; }

  .spinner { display: inline-block; width: 10px; height: 10px; border: 1.5px solid rgba(232,255,71,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .strava-loading { font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); display: flex; align-items: center; gap: 6px; margin-top: 6px; }

  @media (max-width: 600px) {
    .session-card { grid-template-columns: 80px 1fr; }
    .session-meta { display: none; }
    .header-inner { flex-direction: column; }
    .strava-panel { align-items: flex-start; }
  }
</style>
</head>

];

// ── STATE ──
const completedKey = 'vo2plan_v3_completed';
const tokenKey = 'vo2plan_v3_token';
const linksKey = 'vo2plan_v3_links'; // { "wi-si": activityId }

let completed = JSON.parse(localStorage.getItem(completedKey) || '{}');
let stravaToken = JSON.parse(localStorage.getItem(tokenKey) || 'null');
let sessionLinks = JSON.parse(localStorage.getItem(linksKey) || '{}');
let activities = []; // all fetched strava runs

function save() {
  localStorage.setItem(completedKey, JSON.stringify(completed));
  localStorage.setItem(linksKey, JSON.stringify(sessionLinks));
}
function saveToken(t) { stravaToken = t; localStorage.setItem(tokenKey, JSON.stringify(t)); }

// ── OAUTH ──
function getRedirectUri() { return window.location.href.split('?')[0].split('#')[0]; }
function stravaAuthUrl() {
  return `https://www.strava.com/oauth/authorize?` + new URLSearchParams({ client_id: STRAVA_CLIENT_ID, redirect_uri: getRedirectUri(), response_type: 'code', approval_prompt: 'auto', scope: 'read,activity:read' });
}
async function exchangeCode(code) {
  const r = await fetch('https://www.strava.com/oauth/token', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ client_id: STRAVA_CLIENT_ID, client_secret: STRAVA_CLIENT_SECRET, code, grant_type:'authorization_code' }) });
  return r.json();
}
async function refreshIfNeeded() {
  if (!stravaToken) return null;
  if (Date.now()/1000 < stravaToken.expires_at - 60) return stravaToken.access_token;
  const r = await fetch('https://www.strava.com/oauth/token', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ client_id: STRAVA_CLIENT_ID, client_secret: STRAVA_CLIENT_SECRET, refresh_token: stravaToken.refresh_token, grant_type:'refresh_token' }) });
  const data = await r.json();
  if (data.access_token) { saveToken({...stravaToken,...data}); return data.access_token; }
  return null;
}

// ── STRAVA API ──
async function fetchActivities() {
  const token = await refreshIfNeeded();
  if (!token) return [];
  const r = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=50', { headers:{'Authorization':`Bearer ${token}`} });
  const data = await r.json();
  return Array.isArray(data) ? data.filter(a => a.type==='Run' || a.sport_type==='Run') : [];
}
async function fetchProfile() {
  const token = await refreshIfNeeded();
  if (!token) return null;
  const r = await fetch('https://www.strava.com/api/v3/athlete', { headers:{'Authorization':`Bearer ${token}`} });
  return r.json();
}

// ── UTILS ──
function secsToPace(s) { const m=Math.floor(s/60); return `${m}:${Math.round(s%60).toString().padStart(2,'0')}`; }
function fmtDate(str) { return new Date(str).toLocaleDateString('en-GB',{weekday:'short',month:'short',day:'numeric'}); }
function fmtKm(m) { return (m/1000).toFixed(2); }

// ── DISCONNECT ──
function disconnectStrava() {
  stravaToken = null; activities = []; sessionLinks = {};
  localStorage.removeItem(tokenKey); save();
  document.getElementById('stravaUser').style.display='none';
  document.getElementById('stravaConnectBtn').style.display='flex';
  refreshAllLinkAreas();
}

// ── SHOW USER ──
function showUser(profile) {
  document.getElementById('stravaConnectBtn').style.display='none';
  document.getElementById('stravaUser').style.display='block';
  document.getElementById('stravaName').textContent = profile.firstname+' '+profile.lastname;
  if (profile.profile_medium) document.getElementById('stravaAvatar').src = profile.profile_medium;
}

// ── LINK AREA RENDER ──
function renderLinkArea(wi, si) {
  const id = `${wi}-${si}`;
  const container = document.getElementById(`link-area-${id}`);
  if (!container) return;
  container.innerHTML = '';

  const linkedId = sessionLinks[id];
  const activity = linkedId ? activities.find(a => String(a.id) === String(linkedId)) : null;

  if (!stravaToken) {
    // Not connected — show nothing (connect button is in header)
    return;
  }

  if (activity) {
    // Show linked activity + AI feedback
    const km = fmtKm(activity.distance);
    const pace = secsToPace(activity.moving_time / (activity.distance/1000));
    const hr = activity.average_heartrate ? `${Math.round(activity.average_heartrate)} bpm` : '—';
    const elev = activity.total_elevation_gain ? `${Math.round(activity.total_elevation_gain)}m` : '—';
    const date = fmtDate(activity.start_date_local);

    container.innerHTML = `
      <div class="linked-activity">
        <div class="linked-activity-header">
          <div class="linked-activity-name">🟠 ${activity.name}</div>
          <div class="linked-activity-actions">
            <button class="unlink-btn" onclick="unlinkActivity('${id}')">unlink</button>
          </div>
        </div>
        <div class="linked-stats">
          <div class="linked-stat">Date <span>${date}</span></div>
          <div class="linked-stat">Dist <span>${km}km</span></div>
          <div class="linked-stat">Pace <span>${pace}/km</span></div>
          <div class="linked-stat">HR <span>${hr}</span></div>
          <div class="linked-stat">Elev <span>${elev}</span></div>
        </div>
        <button class="ai-feedback-btn" id="fbtn-${id}" onclick="getAIFeedback('${id}')">
          <span>✦</span> Get AI feedback
        </button>
        <div class="ai-feedback-box" id="fbox-${id}"></div>
      </div>`;
  } else {
    // Show link button
    container.innerHTML = `
      <div class="link-activity-area">
        <button class="link-btn" onclick="openPicker('${id}')">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="#FC4C02"><path d="M15.387 17.944l-2.089-4.116h-3.065L15.387 24l5.15-10.172h-3.066m-7.008-5.599l2.836 5.598h4.172L10.463 0l-7 13.828h4.172"/></svg>
          Link Strava activity
        </button>
        <div class="activity-picker" id="picker-${id}">
          <div class="picker-header">
            <span>SELECT YOUR RUN</span>
            <span class="picker-close" onclick="closePicker('${id}')">×</span>
          </div>
          <div class="picker-list" id="picker-list-${id}"></div>
        </div>
      </div>`;
  }
}

function refreshAllLinkAreas() {
  plan.forEach((w,wi) => w.sessions.forEach((_,si) => renderLinkArea(wi,si)));
}

// ── PICKER ──
function openPicker(id) {
  const list = document.getElementById(`picker-list-${id}`);
  const picker = document.getElementById(`picker-${id}`);
  if (!activities.length) {
    list.innerHTML = `<div class="picker-empty">No Strava activities loaded yet.<br>Make sure you're connected.</div>`;
  } else {
    list.innerHTML = activities.slice(0,40).map(a => {
      const km = fmtKm(a.distance);
      const pace = secsToPace(a.moving_time / (a.distance/1000));
      const date = fmtDate(a.start_date_local);
      return `<div class="picker-item" onclick="linkActivity('${id}', '${a.id}')">
        <div>
          <div class="picker-item-name">${a.name}</div>
          <div class="picker-item-meta">${km}km · ${pace}/km</div>
        </div>
        <div class="picker-item-date">${date}</div>
      </div>`;
    }).join('');
  }
  picker.classList.add('open');
}

function closePicker(id) {
  document.getElementById(`picker-${id}`)?.classList.remove('open');
}

function linkActivity(sessionId, activityId) {
  sessionLinks[sessionId] = activityId;
  save();
  const [wi,si] = sessionId.split('-').map(Number);
  renderLinkArea(wi, si);
}

function unlinkActivity(sessionId) {
  delete sessionLinks[sessionId];
  save();
  const [wi,si] = sessionId.split('-').map(Number);
  renderLinkArea(wi, si);
}

// ── AI FEEDBACK ──
async function getAIFeedback(sessionId) {
  const btn = document.getElementById(`fbtn-${sessionId}`);
  const box = document.getElementById(`fbox-${sessionId}`);
  if (!btn || !box) return;

  const actId = sessionLinks[sessionId];
  const activity = activities.find(a => String(a.id) === String(actId));
  if (!activity) return;

  const [wi,si] = sessionId.split('-').map(Number);
  const session = plan[wi].sessions[si];

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Analysing...';

  const km = fmtKm(activity.distance);
  const pace = secsToPace(activity.moving_time / (activity.distance/1000));
  const paceSeconds = activity.moving_time / (activity.distance/1000);
  const hr = activity.average_heartrate ? `${Math.round(activity.average_heartrate)} bpm avg` : 'no HR data';
  const elev = activity.total_elevation_gain ? `${Math.round(activity.total_elevation_gain)}m elevation gain` : '';

  const prompt = `You are an expert running coach analysing a session for bowlie, a recreational runner (3-12 months experience) in Distrito San Carlos, Panama Oeste — hot and humid with hilly terrain (~78m elevation gain per run). Goal: improve VO2 max for athletic performance. Est. VDOT: 36-38. Easy pace baseline: 7:53/km.

Training zones: Easy 7:30-8:10/km · Tempo 5:50-6:10/km · VO2 max 5:10-5:30/km · 400m reps 2:05-2:12 each.

Planned session (Week ${wi+1}, ${session.day}): ${session.title}
Target: ${session.desc.replace(/<[^>]*>/g,'')}
Target distance: ${session.dist}km

Actual Strava data:
- Activity: ${activity.name}
- Distance: ${km}km · Avg pace: ${pace}/km (${Math.round(paceSeconds)} sec/km)
- Heart rate: ${hr} · ${elev}
- Moving time: ${Math.floor(activity.moving_time/60)}min

Give direct, honest coaching feedback in 3-4 sentences: (1) how their actual pace compared to target, (2) one key observation, (3) one specific actionable tip for next time. Be encouraging but honest. Account for Panama heat adding ~20-30 sec/km. Under 100 words.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{role:'user',content:prompt}] })
    });
    const data = await res.json();
    const text = data.content?.map(c=>c.text||'').join('') || 'Unable to generate feedback.';
    box.textContent = text;
    box.style.display = 'block';
    btn.style.display = 'none';
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '<span>✦</span> Retry';
  }
}

// ── PROGRESS ──
function updateProgress() {
  let total=0, done=0;
  plan.forEach((w,wi) => w.sessions.forEach((_,si) => { total++; if(completed[`${wi}-${si}`]) done++; }));
  document.getElementById('progressFill').style.width = Math.round(done/total*100)+'%';
  document.getElementById('progressText').textContent = `${done} of ${total} sessions complete`;
}

// ── RENDER ──
function renderNav() {
  const nav = document.getElementById('weekNav');
  plan.forEach((w,i) => {
    const btn = document.createElement('button');
    btn.className = 'week-btn'+(w.recovery?' recovery':'')+(i===0?' active':'');
    btn.textContent = `W${w.week}${w.recovery?' ↓':''}`;
    btn.onclick = () => {
      document.querySelectorAll('.week-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.week-panel').forEach(p=>p.classList.remove('active'));
      document.getElementById(`panel-${i}`).classList.add('active');
    };
    nav.appendChild(btn);
  });
}

function renderPanels() {
  const container = document.getElementById('weekPanels');
  plan.forEach((w,wi) => {
    const panel = document.createElement('div');
    panel.className = 'week-panel'+(wi===0?' active':'');
    panel.id = `panel-${wi}`;

    let html = `<div class="week-header">
      <div>
        <div class="week-title" style="color:${w.recovery?'var(--accent2)':'var(--text)'}">${w.title}</div>
        <div class="week-focus">${w.focus}</div>
      </div>
      <div class="week-stats">
        <div class="stat"><div class="stat-val">${w.totalKm}</div><div class="stat-key">km total</div></div>
        <div class="stat"><div class="stat-val">${w.sessions.length}</div><div class="stat-key">sessions</div></div>
      </div>
    </div>`;

    if (w.recovery) html += `<div class="recovery-banner"><div class="recovery-icon">🔋</div><div class="recovery-text"><strong>Recovery week — drop volume 30%.</strong> VO2 max gains happen during rest. Resist the urge to do more.</div></div>`;

    html += '<div class="sessions">';
    w.sessions.forEach((s,si) => {
      const id = `${wi}-${si}`;
      const isDone = !!completed[id];
      html += `<div class="session-card ${s.type}" data-id="${id}" style="opacity:${isDone?0.5:1}">
        <div>
          <div class="session-day">${s.day}</div>
          <div class="session-type-badge">${s.type==='vo2'?'VO2 Max':s.type.charAt(0).toUpperCase()+s.type.slice(1)}</div>
        </div>
        <div class="session-body">
          <div class="session-title">${s.title}</div>
          <div class="session-desc">${s.desc}</div>
          <div id="link-area-${id}"></div>
        </div>
        <div class="session-meta">
          <div class="session-dist">${s.dist}<span class="session-dist-unit"> km</span></div>
          <div class="session-pace">${s.pace}/km</div>
        </div>
        <div class="session-check${isDone?' done':''}" data-id="${id}" title="Mark complete"></div>
      </div>`;
    });
    html += '</div>';

    const tips = getWeekTips(wi);
    if (tips.length) {
      html += `<div class="tips-section"><div class="tips-title">Coach notes</div><div class="tips-grid">`;
      tips.forEach(t => { html += `<div class="tip-card"><strong>${t.title}</strong>${t.body}</div>`; });
      html += '</div></div>';
    }

    panel.innerHTML = html;
    container.appendChild(panel);
  });

  document.querySelectorAll('.session-check').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.id;
      completed[id] = !completed[id];
      save();
      el.classList.toggle('done', completed[id]);
      el.closest('.session-card').style.opacity = completed[id] ? '0.5' : '1';
      updateProgress();
    };
  });
}

function getWeekTips(wi) {
  const t = [
    [{title:"Panama heat",body:"Add 20–30 sec/km on hot/humid days. Use perceived effort as your primary guide."},{title:"Easy means easy",body:"If you can't hold a full conversation, you're going too fast. Slow down."},{title:"Elevation factor",body:"Your 78m of gain adds ~15–20 sec/km equivalent effort."}],
    [{title:"RPE scale",body:"Easy=5/10 · Tempo=7/10 · VO2 max=9/10. Nailing effort matters more than exact pace."},{title:"Interval recovery",body:"The 3-min jog between intervals lets you sustain quality on each rep. Don't skip it."}],
    [{title:"Peak week alert",body:"Week 3 is your hardest. Don't skip the easy run — it's active recovery."},{title:"Sleep matters",body:"VO2 max adaptations happen during sleep. Aim for 7–9hrs after hard sessions."}],
    [{title:"Why recovery works",body:"Week 4 is where weeks 1–3 become actual fitness gains. Your body adapts during rest."},{title:"Don't add sessions",body:"Resist adding extra runs. Rest is a non-negotiable part of the plan."}],
    [{title:"400m rep form",body:"Drive arms, lean forward slightly, land under your hips. Use the warm-up to rehearse fast running."},{title:"Walking rest",body:"Walk (don't jog) the 90s rest periods. Full recovery = quality reps."}],
    [{title:"Fitness check",body:"Easy runs should feel noticeably more comfortable than week 1. That's VO2 max adaptation happening."},{title:"Tempo pace",body:"5:40–6:00/km should feel purposeful, not desperate. If sprinting, you went out too fast."}],
    [{title:"Peak week",body:"Hardest week of the plan. Fuel and hydrate well. Heavy legs on Day 2 is normal."},{title:"10 rep 400s",body:"Focus on each rep individually. Don't think about rep 10 while on rep 3."}],
    [{title:"Time trial prep",body:"Don't run hard on Days 1–2. Fresh legs = faster time trial."},{title:"Expected gains",body:"Aim for 8–12% faster than your starting pace. That's a real VO2 max jump in 8 weeks."}],
  ];
  return t[wi]||[];
}

// ── INIT ──
async function init() {
  renderNav();
  renderPanels();
  updateProgress();
  document.getElementById('stravaConnectBtn').href = stravaAuthUrl();

  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (code && !stravaToken) {
    window.history.replaceState({}, '', window.location.pathname);
    const token = await exchangeCode(code);
    if (token.access_token) { saveToken(token); await loadStrava(); }
  } else if (stravaToken) {
    await loadStrava();
  }
}

async function loadStrava() {
  document.getElementById('stravaLoadingMsg').style.display = 'flex';
  const [profile, acts] = await Promise.all([fetchProfile(), fetchActivities()]);
  document.getElementById('stravaLoadingMsg').style.display = 'none';
  if (profile?.id) showUser(profile);
  if (acts.length) { activities = acts; }
  refreshAllLinkAreas();
}

init();
</script>
</body>
</html>
