<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VO2 Max Plan — bowlie</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #131313;
    --surface2: #1c1c1c;
    --border: rgba(255,255,255,0.07);
    --accent: #e8ff47;
    --accent2: #ff6b35;
    --text: #f0ede8;
    --muted: #6b6b6b;
    --easy: #4ade80;
    --tempo: #60a5fa;
    --vo2: #f87171;
    --rest: #6b7280;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }

  /* Header */
  .header { padding: 3rem 2rem 2rem; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
  .header::before { content: ''; position: absolute; top: -60px; right: -60px; width: 300px; height: 300px; background: radial-gradient(circle, rgba(232,255,71,0.06) 0%, transparent 70%); pointer-events: none; }
  .header-inner { max-width: 900px; margin: 0 auto; display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 1.5rem; }
  .header-left {}
  .header-tag { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.15em; color: var(--accent); text-transform: uppercase; margin-bottom: 0.5rem; }
  .header h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(3rem, 8vw, 6rem); letter-spacing: 0.02em; line-height: 0.95; color: var(--text); }
  .header h1 span { color: var(--accent); }
  .header-meta { display: flex; gap: 2rem; margin-top: 1.5rem; flex-wrap: wrap; }
  .meta-item { font-size: 13px; color: var(--muted); }
  .meta-item strong { color: var(--text); font-weight: 500; }

  /* Strava connect */
  .strava-panel { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; padding-top: 0.5rem; }
  .strava-btn {
    display: flex; align-items: center; gap: 10px;
    background: #FC4C02; color: white;
    border: none; border-radius: 6px;
    padding: 10px 18px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
    text-decoration: none; transition: opacity 0.15s; white-space: nowrap;
  }
  .strava-btn:hover { opacity: 0.88; }
  .strava-btn svg { flex-shrink: 0; }
  .strava-connected { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--easy); font-family: 'DM Mono', monospace; }
  .strava-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid var(--easy); object-fit: cover; }
  .strava-disconnect { font-size: 11px; color: var(--muted); background: none; border: none; cursor: pointer; text-decoration: underline; font-family: 'DM Sans', sans-serif; }
  .strava-disconnect:hover { color: var(--text); }

  /* Pace bar */
  .pace-bar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; overflow-x: auto; }
  .pace-bar-inner { max-width: 900px; margin: 0 auto; display: flex; gap: 2rem; align-items: center; min-width: 560px; }
  .pace-label { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; white-space: nowrap; }
  .pace-chip { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  .pace-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .pace-chip-text { font-size: 12px; font-family: 'DM Mono', monospace; }
  .pace-chip-name { color: var(--muted); margin-right: 4px; }

  /* Recent runs bar */
  #recentRunsBar { display: none; background: var(--surface2); border-bottom: 1px solid var(--border); padding: 0.75rem 2rem; }
  .runs-bar-inner { max-width: 900px; margin: 0 auto; }
  .runs-bar-title { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .runs-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .run-chip {
    font-size: 12px; font-family: 'DM Mono', monospace;
    padding: 4px 10px; border-radius: 4px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer; transition: all 0.15s; white-space: nowrap;
  }
  .run-chip:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .run-chip.matched { border-color: var(--easy); color: var(--easy); }

  /* Week nav */
  .week-nav { max-width: 900px; margin: 2rem auto 0; padding: 0 2rem; display: flex; gap: 8px; flex-wrap: wrap; }
  .week-btn { font-family: 'DM Mono', monospace; font-size: 12px; padding: 6px 14px; border-radius: 4px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em; }
  .week-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }
  .week-btn.active { background: var(--accent); color: #0a0a0a; border-color: var(--accent); font-weight: 500; }
  .week-btn.recovery { border-color: rgba(255,107,53,0.4); }
  .week-btn.recovery.active { background: var(--accent2); border-color: var(--accent2); color: white; }

  /* Main */
  .main { max-width: 900px; margin: 0 auto; padding: 2rem; }

  /* Progress */
  .progress-section { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 2rem; }
  .progress-label { display: flex; justify-content: space-between; font-size: 12px; font-family: 'DM Mono', monospace; color: var(--muted); margin-bottom: 8px; }
  .progress-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 3px; transition: width 0.4s ease; }

  /* Week header */
  .week-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem; flex-wrap: wrap; }
  .week-title { font-family: 'Bebas Neue', sans-serif; font-size: 3.5rem; letter-spacing: 0.02em; line-height: 1; }
  .week-focus { font-size: 13px; color: var(--muted); font-family: 'DM Mono', monospace; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.08em; }
  .week-stats { display: flex; gap: 1.5rem; padding: 1rem 1.25rem; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; flex-shrink: 0; }
  .stat { text-align: right; }
  .stat-val { font-family: 'DM Mono', monospace; font-size: 18px; font-weight: 500; color: var(--accent); }
  .stat-key { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }

  /* Sessions */
  .sessions { display: flex; flex-direction: column; gap: 12px; }
  .session-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1.25rem 1.5rem 1.25rem 1.5rem; display: grid; grid-template-columns: 100px 1fr auto; gap: 1rem; align-items: start; transition: border-color 0.15s; position: relative; overflow: hidden; }
  .session-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .session-card.easy::before { background: var(--easy); }
  .session-card.tempo::before { background: var(--tempo); }
  .session-card.vo2::before { background: var(--vo2); }
  .session-card.rest::before { background: var(--rest); }
  .session-card:hover { border-color: rgba(255,255,255,0.12); }
  .session-day { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; padding-top: 2px; }
  .session-type-badge { display: inline-block; font-size: 10px; font-family: 'DM Mono', monospace; padding: 2px 8px; border-radius: 3px; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 6px; }
  .easy .session-type-badge { background: rgba(74,222,128,0.12); color: var(--easy); }
  .tempo .session-type-badge { background: rgba(96,165,250,0.12); color: var(--tempo); }
  .vo2 .session-type-badge { background: rgba(248,113,113,0.12); color: var(--vo2); }
  .rest .session-type-badge { background: rgba(107,114,128,0.12); color: var(--rest); }
  .session-title { font-weight: 500; font-size: 15px; margin-bottom: 6px; }
  .session-desc { font-size: 13px; color: var(--muted); line-height: 1.5; }
  .session-desc strong { color: var(--text); font-weight: 500; }
  .session-meta { text-align: right; flex-shrink: 0; min-width: 80px; }
  .session-dist { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; color: var(--text); }
  .session-dist-unit { font-size: 11px; color: var(--muted); }
  .session-pace { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 4px; }
  .session-check { position: absolute; top: 1rem; right: 1rem; width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; background: transparent; flex-shrink: 0; }
  .session-check:hover { border-color: var(--accent); }
  .session-check.done { background: var(--accent); border-color: var(--accent); }
  .session-check.done::after { content: '✓'; font-size: 12px; color: #0a0a0a; font-weight: 700; }

  /* Strava match */
  .strava-match {
    margin-top: 10px; padding: 10px 12px;
    background: rgba(74,222,128,0.05); border: 1px solid rgba(74,222,128,0.15);
    border-radius: 6px; display: flex; gap: 10px; align-items: flex-start;
  }
  .strava-match-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .strava-match-data { flex: 1; min-width: 0; }
  .strava-match-title { font-size: 12px; font-weight: 500; color: var(--easy); margin-bottom: 4px; }
  .strava-match-stats { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 6px; }
  .strava-stat { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); }
  .strava-stat span { color: var(--text); }
  .ai-feedback-btn {
    font-size: 11px; font-family: 'DM Mono', monospace;
    background: rgba(232,255,71,0.08); border: 1px solid rgba(232,255,71,0.2);
    color: var(--accent); border-radius: 4px; padding: 4px 10px;
    cursor: pointer; transition: all 0.15s; display: inline-flex; align-items: center; gap: 5px;
  }
  .ai-feedback-btn:hover { background: rgba(232,255,71,0.14); }
  .ai-feedback-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .ai-feedback-box {
    margin-top: 8px; padding: 10px 12px;
    background: var(--surface2); border-radius: 6px;
    font-size: 13px; color: var(--muted); line-height: 1.6;
    border-left: 2px solid var(--accent);
  }
  .ai-feedback-box strong { color: var(--text); }

  /* Recovery banner */
  .recovery-banner { background: rgba(255,107,53,0.08); border: 1px solid rgba(255,107,53,0.2); border-radius: 10px; padding: 1.25rem 1.5rem; margin-bottom: 1.5rem; display: flex; gap: 1rem; align-items: flex-start; }
  .recovery-icon { font-size: 24px; flex-shrink: 0; margin-top: -2px; }
  .recovery-text { font-size: 13px; color: var(--muted); }
  .recovery-text strong { color: var(--accent2); }

  /* Tips */
  .tips-section { margin-top: 2rem; }
  .tips-title { font-family: 'DM Mono', monospace; font-size: 11px; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); margin-bottom: 1rem; }
  .tips-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 10px; }
  .tip-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 1rem 1.25rem; font-size: 13px; color: var(--muted); line-height: 1.5; }
  .tip-card strong { color: var(--text); display: block; margin-bottom: 4px; font-size: 13px; }

  .week-panel { display: none; }
  .week-panel.active { display: block; }

  /* Spinner */
  .spinner { display: inline-block; width: 10px; height: 10px; border: 1.5px solid rgba(232,255,71,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.6s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .session-card { grid-template-columns: 80px 1fr; }
    .session-meta { display: none; }
    .header-inner { flex-direction: column; }
    .strava-panel { align-items: flex-start; }
  }
</style>
</head>

  ]},
  { week:8, title:"Week 8", focus:"Taper — prepare to test yourself", totalKm:14, recovery:true, sessions:[
    { day:"Day 1", type:"vo2", title:"400m Sharpeners", dist:5, pace:"mixed", targetPaceMin:120, targetPaceMax:125,
      desc:"<strong>1.5km easy warm-up</strong> → <strong>4 × 400m at 2:00–2:05 each</strong> (2 min walking rest) → <strong>1.5km cool-down</strong>. Maintain sharpness, low volume." },
    { day:"Day 2", type:"easy", title:"Easy Shakeout Run", dist:5, pace:"7:30–8:10", targetPaceMin:450, targetPaceMax:490,
      desc:"Short and easy. Keep legs fresh for Day 3." },
    { day:"Day 3", type:"tempo", title:"5K Time Trial 🏁", dist:4, pace:"all out", targetPaceMin:360, targetPaceMax:420,
      desc:"<strong>1km easy warm-up</strong> → <strong>5K as fast as you can</strong> → <strong>1km cool-down</strong>. Aim for sub-32:00. Expect 8–12% improvement if you followed the plan." },
  ]},
];

// ─── STATE ────────────────────────────────────────────────
const completedKey = 'vo2plan_completed_v2';
const stravaTokenKey = 'vo2plan_strava_token';
let completed = JSON.parse(localStorage.getItem(completedKey) || '{}');
let stravaToken = JSON.parse(localStorage.getItem(stravaTokenKey) || 'null');
let recentActivities = [];
let sessionMatches = {}; // sessionId -> activity

function saveCompleted() { localStorage.setItem(completedKey, JSON.stringify(completed)); }
function saveStravaToken(t) { stravaToken = t; localStorage.setItem(stravaTokenKey, JSON.stringify(t)); }
function disconnectStrava() {
  stravaToken = null; recentActivities = []; sessionMatches = {};
  localStorage.removeItem(stravaTokenKey);
  document.getElementById('stravaUser').style.display = 'none';
  document.getElementById('stravaConnectBtn').style.display = 'flex';
  document.getElementById('recentRunsBar').style.display = 'none';
  document.querySelectorAll('.strava-match').forEach(el => el.remove());
}

// ─── OAUTH ────────────────────────────────────────────────
function getRedirectUri() { return window.location.href.split('?')[0].split('#')[0]; }

function buildStravaAuthUrl() {
  const params = new URLSearchParams({
    client_id: STRAVA_CLIENT_ID,
    redirect_uri: getRedirectUri(),
    response_type: 'code',
    approval_prompt: 'auto',
    scope: STRAVA_SCOPE
  });
  return `https://www.strava.com/oauth/authorize?${params}`;
}

async function exchangeCode(code) {
  const res = await fetch('https://www.strava.com/oauth/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      client_id: STRAVA_CLIENT_ID,
      client_secret: STRAVA_CLIENT_SECRET,
      code,
      grant_type: 'authorization_code'
    })
  });
  return res.json();
}

async function refreshToken(refresh_token) {
  const res = await fetch('https://www.strava.com/oauth/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      client_id: STRAVA_CLIENT_ID,
      client_secret: STRAVA_CLIENT_SECRET,
      refresh_token,
      grant_type: 'refresh_token'
    })
  });
  return res.json();
}

async function getValidToken() {
  if (!stravaToken) return null;
  if (Date.now() / 1000 < stravaToken.expires_at - 60) return stravaToken.access_token;
  const refreshed = await refreshToken(stravaToken.refresh_token);
  if (refreshed.access_token) {
    saveStravaToken({ ...stravaToken, ...refreshed });
    return refreshed.access_token;
  }
  return null;
}

// ─── STRAVA API ───────────────────────────────────────────
async function fetchRecentActivities() {
  const token = await getValidToken();
  if (!token) return [];
  const res = await fetch('https://www.strava.com/api/v3/athlete/activities?per_page=30', {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  const acts = await res.json();
  return Array.isArray(acts) ? acts.filter(a => a.type === 'Run' || a.sport_type === 'Run') : [];
}

async function fetchAthleteProfile() {
  const token = await getValidToken();
  if (!token) return null;
  const res = await fetch('https://www.strava.com/api/v3/athlete', {
    headers: { 'Authorization': `Bearer ${token}` }
  });
  return res.json();
}

// ─── STRAVA UI ────────────────────────────────────────────
function showStravaUser(profile) {
  document.getElementById('stravaConnectBtn').style.display = 'none';
  document.getElementById('stravaUser').style.display = 'block';
  document.getElementById('stravaName').textContent = profile.firstname + ' ' + profile.lastname;
  if (profile.profile_medium) document.getElementById('stravaAvatar').src = profile.profile_medium;
}

function secsToPace(secs) {
  const m = Math.floor(secs / 60);
  const s = Math.round(secs % 60);
  return `${m}:${s.toString().padStart(2,'0')}`;
}

function renderRecentRuns(activities) {
  const bar = document.getElementById('recentRunsBar');
  const chips = document.getElementById('runsChips');
  chips.innerHTML = '';
  bar.style.display = 'block';
  activities.slice(0, 15).forEach(a => {
    const km = (a.distance / 1000).toFixed(1);
    const pace = secsToPace(a.moving_time / (a.distance / 1000));
    const date = new Date(a.start_date_local).toLocaleDateString('en-GB', { month:'short', day:'numeric' });
    const chip = document.createElement('div');
    chip.className = 'run-chip' + (sessionMatches[a.id] ? ' matched' : '');
    chip.textContent = `${date} · ${km}km · ${pace}/km`;
    chip.title = a.name;
    chips.appendChild(chip);
  });
}

function matchActivitiesToSessions(activities) {
  sessionMatches = {};
  plan.forEach((w, wi) => {
    w.sessions.forEach((s, si) => {
      const id = `${wi}-${si}`;
      // find best matching activity: closest distance within ±30%
      let best = null, bestDiff = Infinity;
      activities.forEach(a => {
        const km = a.distance / 1000;
        const diff = Math.abs(km - s.dist);
        const pct = diff / s.dist;
        if (pct < 0.35 && diff < bestDiff) { best = a; bestDiff = diff; }
      });
      if (best) sessionMatches[id] = best;
    });
  });
}

function injectStravaMatches() {
  plan.forEach((w, wi) => {
    w.sessions.forEach((s, si) => {
      const id = `${wi}-${si}`;
      const activity = sessionMatches[id];
      if (!activity) return;
      const card = document.querySelector(`.session-card[data-session-id="${id}"]`);
      if (!card) return;
      // Remove existing match if any
      const existing = card.querySelector('.strava-match');
      if (existing) existing.remove();

      const km = (activity.distance / 1000).toFixed(2);
      const pace = secsToPace(activity.moving_time / (activity.distance / 1000));
      const date = new Date(activity.start_date_local).toLocaleDateString('en-GB', { weekday:'short', month:'short', day:'numeric' });
      const hr = activity.average_heartrate ? `${Math.round(activity.average_heartrate)} bpm` : '—';
      const elev = activity.total_elevation_gain ? `${Math.round(activity.total_elevation_gain)}m` : '—';

      const matchDiv = document.createElement('div');
      matchDiv.className = 'strava-match';
      matchDiv.innerHTML = `
        <div class="strava-match-icon">🟠</div>
        <div class="strava-match-data">
          <div class="strava-match-title">Strava: ${activity.name} · ${date}</div>
          <div class="strava-match-stats">
            <div class="strava-stat">Dist <span>${km}km</span></div>
            <div class="strava-stat">Pace <span>${pace}/km</span></div>
            <div class="strava-stat">HR <span>${hr}</span></div>
            <div class="strava-stat">Elev <span>${elev}</span></div>
          </div>
          <button class="ai-feedback-btn" onclick="getAIFeedback('${id}', this)">
            <span>✦</span> Get AI feedback
          </button>
          <div class="ai-feedback-box" id="feedback-${id}" style="display:none"></div>
        </div>
      `;
      const body = card.querySelector('.session-body');
      body.appendChild(matchDiv);
    });
  });
}

// ─── AI FEEDBACK ──────────────────────────────────────────
async function getAIFeedback(sessionId, btn) {
  const activity = sessionMatches[sessionId];
  if (!activity) return;
  const [wi, si] = sessionId.split('-').map(Number);
  const session = plan[wi].sessions[si];

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Analysing...';

  const km = (activity.distance / 1000).toFixed(2);
  const pace = secsToPace(activity.moving_time / (activity.distance / 1000));
  const paceSeconds = activity.moving_time / (activity.distance / 1000);
  const hr = activity.average_heartrate ? `${Math.round(activity.average_heartrate)} bpm avg` : 'no HR data';
  const elev = activity.total_elevation_gain ? `${Math.round(activity.total_elevation_gain)}m elevation gain` : '';

  const prompt = `You are an expert running coach analysing a session for bowlie, a recreational runner (3-12 months experience) based in Distrito San Carlos, Panama Oeste — hot and humid conditions with hilly terrain (~78m elevation gain per run).

Their training goal: improve VO2 max for athletic performance. Est. VDOT: 36-38. Easy pace baseline: 7:53/km.

Training zones:
- Easy: 7:30-8:10/km
- Tempo: 5:50-6:10/km  
- VO2 max intervals: 5:10-5:30/km
- 400m reps: 2:05-2:12 each

Planned session (Week ${wi+1}, ${session.day}): ${session.title}
Session target: ${session.desc.replace(/<[^>]*>/g,'')}
Target distance: ${session.dist}km

Actual Strava data:
- Activity: ${activity.name}
- Distance: ${km}km
- Average pace: ${pace}/km (${Math.round(paceSeconds)} sec/km)
- Heart rate: ${hr}
- ${elev}
- Moving time: ${Math.floor(activity.moving_time/60)}min

Give concise, direct coaching feedback in 3-4 sentences. Cover: (1) how the actual pace compared to target, (2) one key observation about performance, (3) one specific actionable tip for the next session of this type. Be honest, encouraging but direct. Account for Panama heat/humidity adding ~20-30 sec/km to effort. Keep it under 100 words.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await response.json();
    const text = data.content?.map(c => c.text || '').join('') || 'Unable to generate feedback.';
    const box = document.getElementById(`feedback-${sessionId}`);
    box.style.display = 'block';
    box.textContent = text;
    btn.style.display = 'none';
  } catch (e) {
    btn.disabled = false;
    btn.innerHTML = '<span>✦</span> Retry feedback';
  }
}

// ─── PROGRESS ─────────────────────────────────────────────
function updateProgress() {
  let total = 0, done = 0;
  plan.forEach((w, wi) => { w.sessions.forEach((s, si) => { total++; if (completed[`${wi}-${si}`]) done++; }); });
  const pct = Math.round((done / total) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} of ${total} sessions complete`;
}

// ─── RENDER ───────────────────────────────────────────────
function renderNav() {
  const nav = document.getElementById('weekNav');
  plan.forEach((w, i) => {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (w.recovery ? ' recovery' : '') + (i === 0 ? ' active' : '');
    btn.textContent = `W${w.week}${w.recovery ? ' ↓' : ''}`;
    btn.onclick = () => {
      document.querySelectorAll('.week-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.week-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`panel-${i}`).classList.add('active');
    };
    nav.appendChild(btn);
  });
}

function renderPanels() {
  const container = document.getElementById('weekPanels');
  plan.forEach((w, wi) => {
    const panel = document.createElement('div');
    panel.className = 'week-panel' + (wi === 0 ? ' active' : '');
    panel.id = `panel-${wi}`;

    let html = `<div class="week-header">
      <div>
        <div class="week-title" style="color:${w.recovery ? 'var(--accent2)' : 'var(--text)'}">${w.title}</div>
        <div class="week-focus">${w.focus}</div>
      </div>
      <div class="week-stats">
        <div class="stat"><div class="stat-val">${w.totalKm}</div><div class="stat-key">km total</div></div>
        <div class="stat"><div class="stat-val">${w.sessions.length}</div><div class="stat-key">sessions</div></div>
      </div>
    </div>`;

    if (w.recovery) {
      html += `<div class="recovery-banner"><div class="recovery-icon">🔋</div><div class="recovery-text"><strong>Recovery week — drop volume 30%.</strong> VO2 max gains happen during rest and recovery. Resist the urge to do more. Come back to week ${wi + 2 <= 8 ? wi + 2 : 'the next block'} fresher and stronger.</div></div>`;
    }

    html += '<div class="sessions">';
    w.sessions.forEach((s, si) => {
      const id = `${wi}-${si}`;
      const isDone = !!completed[id];
      html += `<div class="session-card ${s.type}" data-session-id="${id}" style="opacity:${isDone ? 0.5 : 1}">
        <div>
          <div class="session-day">${s.day}</div>
          <div class="session-type-badge">${s.type === 'vo2' ? 'VO2 Max' : s.type.charAt(0).toUpperCase() + s.type.slice(1)}</div>
        </div>
        <div class="session-body">
          <div class="session-title">${s.title}</div>
          <div class="session-desc">${s.desc}</div>
        </div>
        <div class="session-meta">
          <div class="session-dist">${s.dist}<span class="session-dist-unit"> km</span></div>
          <div class="session-pace">${s.pace}/km</div>
        </div>
        <div class="session-check${isDone ? ' done' : ''}" data-id="${id}" title="Mark as done"></div>
      </div>`;
    });
    html += '</div>';

    const tips = getWeekTips(wi);
    if (tips.length) {
      html += `<div class="tips-section"><div class="tips-title">Coach notes</div><div class="tips-grid">`;
      tips.forEach(t => { html += `<div class="tip-card"><strong>${t.title}</strong>${t.body}</div>`; });
      html += '</div></div>';
    }

    panel.innerHTML = html;
    container.appendChild(panel);
  });

  document.querySelectorAll('.session-check').forEach(el => {
    el.onclick = () => {
      const id = el.dataset.id;
      completed[id] = !completed[id];
      saveCompleted();
      el.classList.toggle('done', completed[id]);
      el.closest('.session-card').style.opacity = completed[id] ? '0.5' : '1';
      updateProgress();
    };
  });
}

function getWeekTips(wi) {
  const tips = [
    [{ title:"Panama heat", body:"Add 20–30 sec/km to all paces on hot/humid days. Use perceived effort as your primary guide, not the watch." },{ title:"Easy means easy", body:"If you can't hold a full conversation, you're running too fast. Slow down — it's smart training." },{ title:"Elevation factor", body:"Your 78m of gain adds ~15–20 sec/km equivalent effort. Your actual fitness is better than flat pace suggests." }],
    [{ title:"RPE scale", body:"Easy = 5/10. Tempo = 7/10. VO2 max intervals = 9/10. The numbers only matter if you nail the effort levels." },{ title:"Interval recovery", body:"The 3-minute jog between intervals isn't optional — it's what lets you sustain quality on each rep." }],
    [{ title:"Peak week alert", body:"Week 3 is your hardest week. Don't skip the easy run — it's active recovery, not extra hard work." },{ title:"Sleep matters", body:"VO2 max adaptations happen during sleep. Aim for 7–9 hours, especially after hard sessions." }],
    [{ title:"Why recovery works", body:"VO2 max improvements happen when your body repairs itself after stress. Week 4 is where weeks 1–3 become fitness gains." },{ title:"Don't add sessions", body:"Resist adding extra runs this week. Rest is part of the plan." }],
    [{ title:"400m rep form", body:"Drive your arms, lean slightly forward, land under your hips. Fast running is a skill — use the warm-up to rehearse it." },{ title:"Walking rest", body:"Walk (don't jog) during rest periods. Full recovery between reps lets you maintain quality on each one." }],
    [{ title:"Fitness check", body:"By now your easy runs should feel noticeably more comfortable than week 1. That's real VO2 max adaptation." },{ title:"Tempo pace", body:"5:40–6:00/km should feel purposeful and controlled. If it feels like a sprint, you've gone out too fast." }],
    [{ title:"Peak week", body:"This is the hardest week of the plan. Fuel and hydrate well. Expect heavy legs on Day 2 — that's normal." },{ title:"10 rep 400s", body:"Treat this session like a mini-race. Focus on each rep individually — don't think about rep 10 on rep 3." }],
    [{ title:"Time trial prep", body:"Day 3 is your 5K test. Don't run hard on Days 1–2. Fresh legs = faster time." },{ title:"Expected improvement", body:"Aim for 8–12% faster than your starting easy pace. That's a meaningful VO2 max jump in 8 weeks." }],
  ];
  return tips[wi] || [];
}

// ─── INIT ─────────────────────────────────────────────────
async function init() {
  renderNav();
  renderPanels();
  updateProgress();

  // Set up connect button
  document.getElementById('stravaConnectBtn').href = buildStravaAuthUrl();

  // Handle OAuth callback
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  if (code && !stravaToken) {
    // Clean URL
    window.history.replaceState({}, document.title, window.location.pathname);
    const token = await exchangeCode(code);
    if (token.access_token) {
      saveStravaToken(token);
      await loadStravaData();
    }
  } else if (stravaToken) {
    await loadStravaData();
  }
}

async function loadStravaData() {
  const [profile, activities] = await Promise.all([fetchAthleteProfile(), fetchRecentActivities()]);
  if (profile && profile.id) {
    showStravaUser(profile);
    stravaToken = { ...stravaToken, athlete: profile };
    saveStravaToken(stravaToken);
  }
  if (activities.length) {
    recentActivities = activities;
    matchActivitiesToSessions(activities);
    renderRecentRuns(activities);
    injectStravaMatches();
  }
}

init();
</script>
